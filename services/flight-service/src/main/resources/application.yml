server:
  port: 5005

spring:
  application:
    name: flight-service
  datasource:
    # Supports MySQL or Oracle. Update database credentials as needed.
    url: jdbc:mysql://localhost:3306/airline_flight_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
    # For Oracle DB, use: jdbc:oracle:thin:@localhost:1521:ORCL
    # url: jdbc:oracle:thin:@localhost:1521:XE
    username: root
    password: sajidsai
    driver-class-name: com.mysql.cj.jdbc.Driver
    # For Oracle: oracle.jdbc.OracleDriver
    # driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        # For Oracle: org.hibernate.dialect.OracleDialect
        # dialect: org.hibernate.dialect.OracleDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
